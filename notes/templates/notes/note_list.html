{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Sticky Notes</title>
    <link rel="stylesheet" href="{% static 'notes/style.css' %}">
</head>
<body>
    <h1>Sticky Notes</h1>

    <a href="{% url 'note_create' %}">Create New Note</a>

    <hr>

    {% for note in notes %}
        <h2>{{ note.title }}</h2>
        <p>{{ note.content }}</p>

        <a href="{% url 'note_update' note.id %}">Edit</a>
        <a href="{% url 'note_delete' note.id %}">Delete</a>

        <hr>
    {% empty %}
        <p>No notes yet.</p>
    {% endfor %}
</body>
</html>
